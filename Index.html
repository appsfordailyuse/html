<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML File Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation: gradient 10s ease infinite;
    padding:20px;
}

@keyframes gradient {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    width:100%;
    max-width:850px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    color:#fff;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

textarea{
    width:100%;
    height:260px;
    padding:15px;
    border-radius:12px;
    border:none;
    resize:none;
    outline:none;
    font-size:14px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-bottom:10px;
}

.note{
    font-size:13px;
    margin-bottom:10px;
    opacity:0.85;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
    font-weight:600;
}

.generate{
    background:#00c6ff;
    color:#fff;
}

.generate:hover{
    background:#0099cc;
}

.download{
    background:#28a745;
    color:#fff;
    display:none;
}

.download:hover{
    background:#1e7e34;
}

footer{
    margin-top:25px;
    text-align:center;
    font-size:14px;
    opacity:0.85;
}
</style>
</head>
<body>

<div class="container">
    <h1>HTML File Generator</h1>

    <textarea id="codeInput" placeholder="Yahan apna HTML code paste karein..."></textarea>

    <div class="note">File name enter karein (agar blank chhoda to default index.html hoga)</div>
    <input type="text" id="fileName" placeholder="File name enter karein">

    <button class="generate" onclick="generateFile()">Generate HTML File</button>
    <button class="download" id="downloadBtn">Download HTML File</button>

    <footer>By: Sami Bajwa</footer>
</div>

<script>
let blobURL = "";
let finalFileName = "index.html";

function generateFile(){
    const code = document.getElementById("codeInput").value;
    let fileName = document.getElementById("fileName").value.trim();

    if(fileName === ""){
        finalFileName = "index.html";
    } else {
        finalFileName = fileName.endsWith(".html") ? fileName : fileName + ".html";
    }

    const blob = new Blob([code], {type:"text/html"});
    blobURL = URL.createObjectURL(blob);

    const downloadBtn = document.getElementById("downloadBtn");
    downloadBtn.style.display = "block";
}

document.getElementById("downloadBtn").addEventListener("click", function(){
    const a = document.createElement("a");
    a.href = blobURL;
    a.download = finalFileName;
    a.click();
});
</script>

</body>
</html>
