<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    color:#fff;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:250px;
    padding:15px;
    border-radius:10px;
    border:none;
    resize:none;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
}

.note{
    font-size:13px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.generate{
    background:#00c6ff;
    color:white;
}

.download{
    background:#28a745;
    color:white;
    display:none;
}

footer{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>HTML File Generator</h1>

    <textarea id="codeInput" placeholder="Yahan apna HTML code paste karein..."></textarea>

    <div class="note">File name enter karein (agar blank chhoda to default index.html hoga)</div>
    <input type="text" id="fileName" placeholder="File name enter karein">

    <button class="generate" onclick="generateFile()">Generate HTML File</button>
    <button class="download" id="downloadBtn">Download HTML File</button>

    <footer>By: Sami Bajwa</footer>
</div>

<script>
let fileBlob = null;
let finalFileName = "index.html";

function generateFile(){
    const code = document.getElementById("codeInput").value;
    let name = document.getElementById("fileName").value.trim();

    if(name === ""){
        finalFileName = "index.html";
    } else {
        finalFileName = name.endsWith(".html") ? name : name + ".html";
    }

    fileBlob = new Blob([code], {type:"text/html"});

    document.getElementById("downloadBtn").style.display = "block";
}

document.getElementById("downloadBtn").addEventListener("click", function(){
    if(fileBlob){
        const link = document.createElement("a");
        link.href = URL.createObjectURL(fileBlob);
        link.download = finalFileName;
        link.click();
    }
});
</script>

</body>
</html>
